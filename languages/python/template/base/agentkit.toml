[app]
name = "__PROJECT_NAME__"
package_name = "__PACKAGE_NAME__"
version = "0.1.0"
default_provider = "openai"
default_mode = "interactive"
working_directory_policy = "project-root"

[prompts]
system = "__BRAND_DOC__"
sections = [
  "AGENTS.md",
  "CLAUDE.md",
  "__BRAND_ROOT__/__BRAND_DOC__",
  "__BRAND_ROOT__/instructions.md",
]
context = ["__BRAND_ROOT__/__BRAND_DOC__", "__BRAND_ROOT__/instructions.md"]
append = []

[tools]
enabled = ["file_read", "file_edit", "file_write", "bash", "web_fetch"]
approval_mode = "default"
deny = []
bash_timeout_ms = 15000
web_fetch_timeout_ms = 10000
max_tool_calls_per_turn = 12

[providers.openai]
api_key_env = "OPENAI_API_KEY"
model = "gpt-5.4"
base_url = ""

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-6"
base_url = ""

[agents]
directories = ["__BRAND_ROOT__/agents"]
enabled = ["planner", "executor", "reviewer"]
default = "executor"

[skills]
directories = ["__BRAND_ROOT__/skills", ".agents/skills"]
enabled = ["plan", "add-feature", "verify"]
auto_discover = true

[features]
enabled = []
